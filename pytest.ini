[pytest]
# ⚠️ 수집 패턴을 test_*.py 로 한정한다 (pytest 기본은 *_test.py 도 수집).
#    motor_control/drive/**/*_test.py, vision/realsense_test.py 는 단위테스트가 아니라
#    **실기 하드웨어 스크립트**다 — pytest 가 import 하는 순간 ODrive USB 탐색/CAN 열기로
#    무한 대기한다 (2026-07-14: 전체 트리 수집이 2시간 행 걸린 원인).
python_files = test_*.py
norecursedirs = .git .codex docs ros2/build ros2/install ros2/log
