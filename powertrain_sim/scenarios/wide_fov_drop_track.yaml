schema_version: 1
scenario_id: wide_fov_drop_track
description: Wide-FOV elevated track with both drop boundaries and a visible lower floor.
units:
  distance: m
  angle: rad
  time: s
  linear_velocity: m/s
  angular_velocity: rad/s
  acceleration: m/s^2
  curvature: 1/m
  friction: '1'
  depth: mm
frames:
  world: map
  body: base_link
  depth: l515_depth_optical_frame
  imu: l515_imu_link
clock:
  start_s: 1.0
  dt_s: 0.02
  duration_s: 4.0
prng:
  algorithm: PCG64
  seed: 6021
  seed_class: regression
track:
  centerline_m: [[0.0, 0.0, 0.4], [3.0, 0.0, 0.4]]
  width_m: [1.2, 1.2]
  height_m: [0.4, 0.4]
  bank_rad: [0.0, 0.0]
  curvature_per_m: [0.0, 0.0]
  friction_coefficient: [0.8, 0.8]
  drop_boundaries:
    - {left: true, right: true}
    - {left: true, right: true}
motion:
  profile: constant_speed
  linear_speed_m_s: 0.35
  yaw_rate_rad_s: 0.0
sensors:
  wheel_states:
    sample_every_n_steps: 1
    noise_std_turns_per_s: 0.0
    wheel_names: [front_left, front_right, mid_left, mid_right, rear_left, rear_right]
  imu:
    sample_every_n_steps: 1
    gyro_bias_rad_s: [0.0, 0.0, 0.0]
    gyro_noise_std_rad_s: 0.0
    accel_bias_m_s2: [0.0, 0.0, 0.0]
    accel_noise_std_m_s2: 0.0
    gravity_m_s2: 9.81
  depth:
    sample_every_n_steps: 5
    shape_px: [60, 80]
    depth_scale_m: 0.001
    base_depth_m: 1.5
    noise_std_m: 0.002
    bank_depth_span_m: 0.04
    # 80x60 pixels at approximately the L515 depth FOV of 70x55 degrees.
    intrinsics_px: {fx: 57.1, fy: 57.6, cx: 39.5, cy: 29.5}
faults:
  wheel_slip: []
  sensor_dropouts: []
  depth_holes: []
  depth_spikes: []
expected_metrics:
  # The integration test injects a short drifting command and consumes the recording;
  # this four-second run intentionally does not traverse the complete 3 m centreline.
  completion: false
  min_clearance_m: 0.10
  edge_overrun_count: 0
  false_hold_count: 0
  fail_open_count: 0
  # A3 dwell(ticks AND >=0.15 s AND 표본 3) 이후 결정론적 회복 꼬리 = 0.20 s.
  max_recovery_time_s: 0.2
  max_estimator_runtime_ms: 5.0
