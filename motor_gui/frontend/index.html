<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>motor_gui</title>
  <link rel="stylesheet" href="/vendor/uPlot.min.css" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background:#111; color:#eee; }
    header { display:flex; align-items:center; gap:1rem; padding:.5rem 1rem; background:#1b1b1b; }
    #estop { background:#c0202a; color:#fff; border:0; font-size:1.1rem;
             font-weight:700; padding:.6rem 1.2rem; border-radius:6px; cursor:pointer; }
    #reconnect { background:#2a6; color:#fff; border:0; font-size:.95rem;
                 padding:.5rem 1rem; border-radius:6px; cursor:pointer; }
    #estop-reset { background:#8a6d1d; color:#fff; border:0; font-size:.95rem;
                   padding:.5rem 1rem; border-radius:6px; cursor:pointer; }
    #status { font-size:.85rem; opacity:.8; }
    main { display:grid; grid-template-columns: 700px 1fr; gap:1rem; padding:1rem; align-items:start; }
    #left { display:flex; flex-direction:column; gap:1rem; max-height: calc(100vh - 80px); overflow:auto; }
    #log { background:#1b1b1b; border-radius:8px; padding:.6rem; font-family:ui-monospace,monospace;
           font-size:.72rem; max-height:260px; overflow:auto; }
    #log h3 { margin:.1rem 0 .4rem; font-size:.9rem; }
    .logline { padding:1px 0; color:#bbb; white-space:pre-wrap; }
    .logline.err { color:#ff7b72; }
    .subhead { margin:.6rem 0 .2rem; font-size:.85rem; opacity:.7; border-top:1px solid #333; padding-top:.4rem; }
    .pgrid { display:grid; grid-template-columns: 1fr 1fr; gap:.15rem .8rem; }
    .pgrid > .subhead { grid-column: 1 / -1; }
    .pgrid .row label { width:auto; min-width:64px; }
    .panel { background:#1b1b1b; border-radius:8px; padding:.8rem; }
    .panel h3 { margin:.2rem 0 .6rem; font-size:.95rem; }
    .row { display:flex; align-items:center; gap:.4rem; margin:.3rem 0; }
    .row label { width:90px; font-size:.8rem; opacity:.85; }
    input, select, button { background:#262626; color:#eee; border:1px solid #333;
                            border-radius:4px; padding:.25rem .4rem; }
    #plots { display:flex; flex-direction:column; gap:1rem; }
  </style>
</head>
<body>
  <header>
    <strong>motor_gui</strong>
    <span id="track"></span>
    <span id="status">connecting…</span>
    <label style="font-size:.8rem;opacity:.85;">속도단위
      <select id="velunit"><option value="rev/s">wheel rev/s</option><option value="m/s">wheel m/s</option></select>
    </label>
    <button id="reconnect">↻ 재연결</button>
    <button id="estop-reset">E-STOP RESET</button>
    <button id="estop">■ E-STOP</button>
  </header>
  <main>
    <div id="left">
      <div id="controls"></div>
      <div id="log" class="panel"><h3>로그</h3></div>
    </div>
    <div id="plots"></div>
  </main>
  <script src="/vendor/uPlot.iife.min.js"></script>
  <script src="/plots.js"></script>
  <script src="/app.js"></script>
</body>
</html>
