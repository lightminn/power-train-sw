# Jetson Orin Nano 전용 (ARM64, JetPack 6). nvidia-container-runtime 은 JetPack 에 기본 포함.
# 사용 예 (젯슨에서):
#   docker compose -f docker/docker-compose.jetson.yml up -d --build
#   docker compose -f docker/docker-compose.jetson.yml exec powertrain bash

services:
  powertrain:
    build:
      context: .
      dockerfile: Dockerfile.jetson
    image: powertrain-sw:jetson
    container_name: powertrain_jetson

    network_mode: host
    runtime: nvidia      # JetPack 의 nvidia-container-runtime — CUDA/TensorRT 노출

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
      - ../:/workspace:rw
      # Provision first with scripts/install_powertrain_runtime_dir.sh.
      - type: bind
        source: /run/powertrain
        target: /run/powertrain
        bind:
          create_host_path: false

    cap_add:
      - SYS_RAWIO

    # V4L2 (/dev/video*), USB device cgroup 등 Jetson HW 직접 접근을 위해 privileged.
    privileged: true
    devices:
      - "/dev/ttyTHS1:/dev/ttyTHS1"

    stdin_open: true
    tty: true
    command: bash

  # can0 TX 웻지 자가복구 워치독 — 컨테이너 스택과 함께 상시 가동 (재부팅 후에도).
  # 모터 PWM 노이즈로 bus-off 반복 시 mttcan 드라이버가 TX 큐를 영구 정지하는 버그를
  # ~2s 안에 감지해 can0 down/up 으로 복구한다. 상세: docs/specs/2026-07-07-can-pwm-noise-tx-wedge.md
  canwatchdog:
    image: powertrain-sw:jetson          # powertrain 서비스가 빌드한 이미지 재사용
    container_name: powertrain_canwatchdog
    network_mode: host                   # can0 은 호스트 netns
    privileged: true                     # ioctl 로 인터페이스 down/up
    volumes:
      - ../:/workspace:rw
    working_dir: /workspace/motor_control
    command: python3 -u -m corner_module.can_watchdog
    restart: unless-stopped

  # 파워트레인 ROS2 노드 (WP4~) — 로봇팔 ros2_humble 과 분리, DDS 로만 통신.
  # 공유는 메시지 계약(robot_arm_msgs 벤더링)뿐. net=host 로 같은 DDS 그래프 합류 +
  # can0 접근(WP5). 빌드·실행은 컨테이너 진입 후:
  #   docker compose -f docker/docker-compose.jetson.yml up -d powertrain_ros
  #   docker exec -it powertrain_ros bash
  #   cd /workspace/ros2 && colcon build && source install/setup.bash
  #   ros2 run powertrain_ros bringup
  powertrain_ros:
    build:
      context: .
      dockerfile: Dockerfile.ros
    image: powertrain-sw:ros
    container_name: powertrain_ros
    network_mode: host                   # DDS(로봇팔 그래프 합류) + can0(WP5)
    ipc: host                            # FastDDS SHM 전송이 컨테이너 경계를 넘게 함.
                                         # ⚠️ net=host+private IPC 조합은 같은 host-id로 SHM
                                         # 로케이터를 광고하면서 세그먼트는 서로 다른 tmpfs 에
                                         # 만들어 암묵 UDP 폴백/간헐 유실을 유발(2026-07-14 실측:
                                         # 양 컨테이너에 동일 이름 fastrtps_* 세그먼트 각자 존재).
                                         # 로봇팔 ros2_humble 도 ipc:host 여야 효과가 있다.
    privileged: true                     # can0 socketcan (WP5)
    environment:
      - PYTHONPATH=/workspace:/workspace/ros2/src/powertrain_ros:/workspace/motor_control
    volumes:
      - ../:/workspace:rw
      - /dev:/dev
      # Provision first with scripts/install_powertrain_runtime_dir.sh.
      - type: bind
        source: /run/powertrain
        target: /run/powertrain
        bind:
          create_host_path: false
      # install_powertrain_runtime_dir.sh provisions this persistent path.
      - type: bind
        source: /var/lib/powertrain
        target: /var/lib/powertrain
        bind:
          create_host_path: false
    working_dir: /workspace
    stdin_open: true
    tty: true
    restart: "on-failure:5"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import powertrain_observability"
      interval: 30s
      timeout: 3s
      retries: 3

  # WP5.2 control-plane supervisor. This service must override the ROS image
  # ENTRYPOINT because that entrypoint always starts the L515 Gateway.
  powertrain_control:
    image: powertrain-sw:ros
    container_name: powertrain_control
    network_mode: host
    ipc: host
    privileged: true                     # can0 access for chassis_node rollout
    volumes:
      - ../:/workspace:rw
      - /dev:/dev
      # Provision first with scripts/install_powertrain_runtime_dir.sh.
      - type: bind
        source: /run/powertrain
        target: /run/powertrain
        bind:
          create_host_path: false
      # install_powertrain_runtime_dir.sh provisions this persistent path.
      - type: bind
        source: /var/lib/powertrain
        target: /var/lib/powertrain
        bind:
          create_host_path: false
    working_dir: /workspace
    entrypoint:
      - /bin/bash
      - -lc
    command:
      - |
        set -e
        source /opt/ros/humble/setup.bash
        cd /workspace/ros2
        colcon build --packages-select robot_arm_msgs powertrain_msgs powertrain_ros
        source install/setup.bash
        exec ros2 launch powertrain_ros control.launch.py
    restart: unless-stopped
    healthcheck:
      # ⚠️ cmdline grep 은 무력하다 — PID 1(bash -lc 래퍼)의 cmdline 에 스크립트 원문이
      #    들어있어 노드가 crash-loop 여도 매치된다(2026-07-14 실측). 실제 생존 신호는
      #    teleop_command :9000 + ops_broker :9001 TCP 리슨이다.
      test:
        - CMD-SHELL
        - python3 -c "import socket; [socket.create_connection(('127.0.0.1', port), 2).close() for port in (9000, 9001)]"
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5m

  # WP5.3 singleton observability journal/status daemon. The ROS image's
  # default ENTRYPOINT starts the L515 Gateway, so this service must override it.
  powertrain_observability:
    image: powertrain-sw:ros
    container_name: powertrain_observability
    network_mode: host
    environment:
      - PYTHONPATH=/workspace:/workspace/ros2/src/powertrain_ros:/workspace/motor_control
    volumes:
      - ../:/workspace:rw
      # Provision both host paths with scripts/install_powertrain_runtime_dir.sh.
      - type: bind
        source: /run/powertrain
        target: /run/powertrain
        bind:
          create_host_path: false
      - type: bind
        source: /var/lib/powertrain
        target: /var/lib/powertrain
        bind:
          create_host_path: false
    working_dir: /workspace
    entrypoint:
      - python3
      - -m
      - powertrain_observability.main
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "from powertrain_observability.client import ObservabilityClient; ObservabilityClient(request_timeout_s=2).query()"
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  # WP6-B autonomy skeleton. This service is intentionally excluded from the default profile
  # and idle even when the profile is selected. Once WP6-B exists, this service must remain the
  # only /autonomy/cmd_vel publisher; no controller or publisher is present in Task 4.
  powertrain_autonomy:
    profiles: ["autonomy"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.autonomy
    image: powertrain-sw:autonomy
    container_name: powertrain_autonomy
    network_mode: host
    runtime: nvidia
    environment:
      - PYTHONPATH=/workspace
      - AUTONOMY_ENABLED=false
    volumes:
      - ../:/workspace:ro
    working_dir: /workspace
    entrypoint:
      - /bin/bash
      - -lc
    command:
      - |
        set -eu
        if [ "$${AUTONOMY_ENABLED:-false}" != "false" ]; then
          echo "WP6-B controller absent; refusing enabled state" >&2
          exit 64
        fi
        echo "idle: no /autonomy/cmd_vel publisher in WP5.3 Task 4"
        exec sleep infinity
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - test "$$AUTONOMY_ENABLED" = false && test "$$(cat /proc/1/comm)" = sleep
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
